[project]
name = "engram-connect"
version = "0.3.3"
description = "Thin Engram command-line client"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Engram" }]
keywords = ["engram", "agent", "memory", "claude-code", "cli", "mcp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/Barsoomx/engram"
Repository = "https://github.com/Barsoomx/engram"

[project.scripts]
engram = "engram_cli.main:console_main"
engram-connect = "engram_cli.main:console_main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["engram_cli"]
