name: engram-test

services:
  app:
    image: engram-backend:test
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: test
    working_dir: /srv/app
    environment:
      ENGRAM_DATABASE_URL: postgresql://engram:engram@db:5432/engram
      DJANGO_SETTINGS_MODULE: settings.test_settings
      ENGRAM_COMPOSE_CONTRACT_PATH: /srv/deploy/compose/docker-compose.yml
    volumes:
      - ./apps/backend:/srv/app
      - ./deploy/compose/docker-compose.yml:/srv/deploy/compose/docker-compose.yml:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: engram
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql
