name: Repository Quality

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  repository-quality:
    name: Repository Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            if git merge-base "origin/${{ github.base_ref }}" HEAD >/dev/null; then
              git diff --check "origin/${{ github.base_ref }}...HEAD"
            else
              git diff-tree --check --no-commit-id --root -r HEAD
            fi
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Check required repository layout
        run: python3 scripts/repository_layout.py

      - name: Check repository text quality
        run: python3 scripts/repository_quality.py

      - name: Run repository tests
        run: python3 -m unittest discover -s tests

      - name: Run CLI tests
        run: PYTHONPATH=packages/cli python3 -m unittest discover -s packages/cli -p '*_tests.py' -v

      - name: Check required docs
        run: |
          test -f docs/north-star.md
          test -f docs/product-requirements.md
          test -f docs/v1-scope.md
          test -f docs/architecture.md
          test -f docs/backend-contracts.md
          test -f docs/rbac-and-scopes.md
          test -f docs/agent-integrations.md
          test -f docs/client-installation.md
          test -f docs/mcp-tools.md
          test -f docs/ai-workflow-loop.md
          test -f docs/admin-ui-requirements.md
          test -f docs/secrets-and-model-config.md
          test -f docs/search-and-retrieval.md
          test -f docs/operations-and-deployment.md
          test -f docs/repository-governance.md
          test -f docs/upstream-fork-boundary.md
          test -f docs/research-notes.md
