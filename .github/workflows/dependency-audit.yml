name: Dependency audit

# Surfaces known vulnerabilities in frontend (pnpm) and backend (pip/poetry) deps on every
# PR as GitHub warning annotations — informational, never fails the run (yellow, not red).

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: pnpm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: pnpm install

      - name: pnpm audit (warnings only)
        working-directory: apps/frontend
        run: |
          echo '### pnpm audit' >> "$GITHUB_STEP_SUMMARY"
          if pnpm audit --audit-level=low | tee -a "$GITHUB_STEP_SUMMARY"; then
            echo "No known vulnerabilities."
          else
            echo "::warning title=pnpm audit::Vulnerable frontend dependencies found — see the job summary / log."
          fi

  pip-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python3 -m pip install poetry==1.8.2

      - name: Install backend dependencies
        working-directory: apps/backend
        run: poetry install --no-interaction

      - name: pip-audit (warnings only)
        working-directory: apps/backend
        run: |
          poetry run pip install pip-audit
          echo '### pip-audit' >> "$GITHUB_STEP_SUMMARY"
          if poetry run pip-audit | tee -a "$GITHUB_STEP_SUMMARY"; then
            echo "No known vulnerabilities."
          else
            echo "::warning title=pip-audit::Vulnerable backend dependencies found — see the job summary / log."
          fi
