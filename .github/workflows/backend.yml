name: Backend

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: engram
          POSTGRES_USER: engram
          POSTGRES_PASSWORD: engram
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U engram -d engram"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENGRAM_DATABASE_URL: postgresql://engram:engram@localhost:5432/engram
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python3 -m pip install poetry==1.8.2

      - name: Install backend dependencies
        working-directory: apps/backend
        run: poetry install --no-interaction

      - name: Check backend Poetry config
        working-directory: apps/backend
        run: poetry check

      - name: Run backend Ruff
        working-directory: apps/backend
        run: poetry run ruff check .

      - name: Check backend format
        working-directory: apps/backend
        run: poetry run ruff format --check .

      - name: Apply backend migrations
        working-directory: apps/backend
        run: poetry run python manage.py migrate --noinput --settings=settings.test_settings

      - name: Check backend migrations are current
        working-directory: apps/backend
        run: poetry run python manage.py makemigrations --check --dry-run --settings=settings.test_settings

      - name: Run upstream import tests
        working-directory: apps/backend
        run: poetry run pytest engram/imports/upstream_import_tests.py -v

      - name: Run backend tests
        working-directory: apps/backend
        run: poetry run pytest -v

      - name: Run CLI tests
        run: PYTHONPATH=packages/cli python3 -m unittest discover -s packages/cli -p '*_tests.py' -v

      - name: Check repository layout
        run: python3 scripts/repository_layout.py

      - name: Check repository text quality
        run: python3 scripts/repository_quality.py

      - name: Run repository tests
        run: python3 -m unittest discover -s tests -v
