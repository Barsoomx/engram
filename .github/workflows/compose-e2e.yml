name: Compose E2E

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  compose-e2e:
    name: Compose E2E
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run Compose golden path
        run: python3 scripts/e2e_golden_path.py

      - name: Run Compose claude-mem import
        run: python3 scripts/e2e_claude_mem_import.py

      - name: Run Compose runtime durability
        timeout-minutes: 30
        run: python3 scripts/e2e_runtime_durability.py
