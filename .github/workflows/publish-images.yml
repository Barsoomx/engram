name: Publish images

# Build the backend + frontend images and, on master or a version tag, push them to the
# GitHub Container Registry (ghcr.io) with signed SLSA build-provenance attestations. The
# server then pulls the pre-built images (private/engram-deploy/deploy-registry.sh) instead
# of receiving a multi-GB `docker save | ssh docker load` over a metered local link.
#
# - master push  -> tags `latest` + `sha-<short>`
# - tag `0.1.0`  -> stable semver tags `0.1.0` + `0.1`
# - tag `engram-v0.2` -> release tags `0.2` (`engram-v0.2.1` -> `0.2.1` + `0.2`); tag pushes never move `latest`
# - pull_request -> BUILD only, NOT pushed (validates the Dockerfiles + placeholder build)
#
# The frontend image is GENERIC: NEXT_PUBLIC_* config is baked as APP_* placeholders and
# replaced at container start (apps/frontend/entrypoint.sh) from the runtime env — so no
# domain is baked and none lives in this repo. All actions are pinned to full-length SHAs.

on:
  push:
    branches: [master]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'engram-v[0-9]*'
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:
    inputs:
      extra_tag:
        description: 'Extra tag to also push (besides latest + sha-<short>)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write        # sign the provenance attestation (Sigstore / OIDC)
  attestations: write    # store the attestation

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: engram-backend
            context: .
            file: apps/backend/Dockerfile
          - image: engram-frontend
            context: apps/frontend
            file: apps/frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lowercase owner for the GHCR path
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}
          # latest is minted ONLY by the raw entry on master below — auto-latest would let any
          # tag push (semver or engram-v*) re-point :latest, which prod pulls.
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=match,pattern=^engram-v(\d+(\.\d+)+)$,group=1
            type=match,pattern=^engram-v(\d+\.\d+)\.\d+$,group=1
            type=sha,format=short
            type=raw,value=${{ github.event.inputs.extra_tag }},enable=${{ github.event.inputs.extra_tag != '' }}

      - name: Build (and push on master / tags)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # Single clean image manifest (no buildkit provenance image-index) so the signed
          # attestation below binds to one unambiguous digest.
          provenance: false
          sbom: false

      - name: Attest build provenance (signed SLSA, pushed to GHCR)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
