name: publish-pypi

# Trusted publishing (OIDC) for the engram-connect distribution (packages/cli).
# Matches the PyPI publisher configured for owner Barsoomx, repo engram, and this
# workflow filename. No API token is stored; PyPI verifies the OIDC identity of
# this workflow. Actions are SHA-pinned per repository policy.
#
# Publish deliberately: run this workflow manually, or push a tag like
# `engram-connect-v0.1.0`. Bump packages/cli/pyproject.toml `version` first;
# PyPI rejects re-uploading an existing version.

on:
  workflow_dispatch:
  push:
    tags:
      - 'engram-connect-v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish engram-connect
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build packages/cli --outdir dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
