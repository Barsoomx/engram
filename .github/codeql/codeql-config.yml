name: 'Engram CodeQL config'

# packages/claude-plugin/hooks/engram_cli/ is a vendored, byte-for-byte copy of
# packages/cli/engram_cli/ (generated by scripts/sync_plugin_bundle.py and pinned
# by bundle_sync_tests.py). The canonical source is analysed under packages/cli/;
# scanning the bundled copy only duplicates findings already triaged there, so it
# is excluded here to avoid double-reporting.
paths-ignore:
  - 'packages/claude-plugin/hooks/engram_cli'
