name: 'Engram CodeQL config'

# Plugin hook bundles are vendored, byte-for-byte copies of
# packages/cli/engram_cli/ generated by scripts/sync_plugin_bundle.py. The
# canonical source is analysed under packages/cli/, so scanning either bundled
# copy only duplicates findings already triaged there.
paths-ignore:
  - 'packages/claude-plugin/hooks/engram_cli'
  - 'packages/codex-plugin/hooks/engram_cli'
