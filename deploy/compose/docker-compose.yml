name: engram

x-backend: &backend
  image: engram-backend:local
  build:
    context: ../..
    dockerfile: apps/backend/Dockerfile
  restart: unless-stopped
  stop_signal: SIGTERM
  env_file:
    - ${ENGRAM_ENV_FILE:-.env}
  environment:
    ENGRAM_DATABASE_URL: postgresql://engram:engram@postgres:5432/engram
    ENGRAM_REDIS_URL: redis://redis:6379/0
    ENGRAM_CELERY_BROKER_URL: amqp://engram:engram@rabbitmq:5672/engram
    ENGRAM_CELERY_RESULT_BACKEND: redis://redis:6379/1
    ENGRAM_PROVIDER_MODE: ${ENGRAM_PROVIDER_MODE:-fake}
    ENGRAM_REALTIME_MIN_CONTENT_CHARS: ${ENGRAM_REALTIME_MIN_CONTENT_CHARS:-80}
    GRANIAN_WORKERS: ${ENGRAM_WEB_WORKERS:-2}
    GRANIAN_BLOCKING_THREADS: '4'
    GRANIAN_RESPAWN_FAILED_WORKERS: 'true'
    GRANIAN_WORKERS_KILL_TIMEOUT: '35'
    GRANIAN_WORKERS_MAX_RSS: ${ENGRAM_WEB_MAX_RSS_MB:-512}
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

x-worker: &worker
  <<: *backend
  stop_grace_period: 12m

services:
  api:
    <<: *backend
    command:
      - /bin/sh
      - -ec
      - >-
        python manage.py migrate --noinput &&
        python manage.py engram_bootstrap_admin &&
        exec granian --interface wsgi settings.wsgi:application --host 0.0.0.0 --port 8000
    stop_grace_period: 45s
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/-/readyz/"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  worker-realtime:
    <<: *worker
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["celery", "-A", "engram.celery_app", "worker", "--loglevel=info", "-Q", "engram-realtime"]

  worker-near-realtime:
    <<: *worker
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["celery", "-A", "engram.celery_app", "worker", "--loglevel=info", "-Q", "engram-near-realtime"]

  worker-batch:
    <<: *worker
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["celery", "-A", "engram.celery_app", "worker", "--loglevel=info", "-Q", "engram-batch", "--prefetch-multiplier=1"]

  worker-highmemory:
    <<: *worker
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["celery", "-A", "engram.celery_app", "worker", "--loglevel=info", "-Q", "engram-highmemory"]

  worker-domain-events:
    <<: *worker
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["celery", "-A", "engram.celery_app", "worker", "--loglevel=info", "-Q", "engram-domain-events"]

  beat:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["celery", "-A", "engram.celery_app", "beat", "--loglevel=info", "--schedule=/var/lib/engram-beat/celerybeat-schedule"]
    stop_grace_period: 30s
    volumes:
      - beat_data:/var/lib/engram-beat

  relay:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["python", "manage.py", "celery_outbox_relay", "--send-timeout", "10", "--shutdown-timeout", "45"]
    stop_grace_period: 60s

  frontend:
    image: engram-frontend:local
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_ENGRAM_API_URL: http://api:8000
      # Sentry is opt-in: unset => these resolve empty, entrypoint.sh clears the baked
      # APP_* placeholders and the browser SDK stays off. NEXT_PUBLIC_SENTRY_CSP_ORIGIN is
      # the ingest origin only (no DSN key) and must be set whenever the DSN is, or the CSP
      # connect-src will block every event.
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_CSP_ORIGIN: ${NEXT_PUBLIC_SENTRY_CSP_ORIGIN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-${ENGRAM_ENVIRONMENT:-}}
      NEXT_PUBLIC_SENTRY_RELEASE: ${ENGRAM_RELEASE:-}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-}
      # Frontend server-side (node) reads this live — same Sentry project as the browser,
      # deliberately NOT the backend's SENTRY_DSN.
      SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-}
      ENGRAM_RELEASE: ${ENGRAM_RELEASE:-}
      NUXT_TELEMETRY_DISABLED: '1'
      PORT: '3000'
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # Test-only CP5 frontend gate: source plus dev dependencies (builder stage), never
  # started as a long-lived service. `run --rm frontend-ci` typechecks, lints, builds,
  # and runs the conflict-surface action/ETag helper tests. The production runner image
  # (the `frontend` service) is unchanged.
  frontend-ci:
    image: engram-frontend-ci:local
    profiles:
      - ci
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
      target: builder
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    command:
      - sh
      - -ec
      - pnpm typecheck && pnpm lint && pnpm build && node --test src/lib/memory-conflict-actions.test.ts

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: engram
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      # PG18+ official image stores data in a major-version subdir; mount the parent.
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    hostname: ${ENGRAM_RABBITMQ_HOSTNAME:-rabbitmq}
    environment:
      RABBITMQ_DEFAULT_USER: engram
      RABBITMQ_DEFAULT_PASS: engram
      RABBITMQ_DEFAULT_VHOST: engram
      RABBITMQ_NODENAME: ${ENGRAM_RABBITMQ_NODENAME:-rabbit@rabbitmq}
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/conf.d/20-engram.conf:ro
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping && rabbitmqctl -q -p engram list_queues name >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  beat_data:
  postgres_data:
  rabbitmq_data:
