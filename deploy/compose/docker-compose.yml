name: engram

x-backend: &backend
  build:
    context: ../..
    dockerfile: apps/backend/Dockerfile
  env_file:
    - .env
  environment:
    ENGRAM_DATABASE_URL: postgresql://engram:engram@postgres:5432/engram
    ENGRAM_REDIS_URL: redis://redis:6379/0
    ENGRAM_CELERY_BROKER_URL: amqp://engram:engram@rabbitmq:5672/engram
    ENGRAM_CELERY_RESULT_BACKEND: redis://redis:6379/1
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:
  api:
    <<: *backend
    command: >
      sh -ec "python manage.py migrate --noinput &&
              gunicorn settings.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/-/readyz/"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  worker:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "celery -A engram.celery_app worker --loglevel=info"

  relay:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "python manage.py celery_outbox_relay"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: engram
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-alpine
    environment:
      RABBITMQ_DEFAULT_USER: engram
      RABBITMQ_DEFAULT_PASS: engram
      RABBITMQ_DEFAULT_VHOST: engram
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
