name: engram

x-backend: &backend
  image: engram-backend:local
  build:
    context: ../..
    dockerfile: apps/backend/Dockerfile
  env_file:
    - .env
  environment:
    ENGRAM_DATABASE_URL: postgresql://engram:engram@postgres:5432/engram
    ENGRAM_REDIS_URL: redis://redis:6379/0
    ENGRAM_CELERY_BROKER_URL: amqp://engram:engram@rabbitmq:5672/engram
    ENGRAM_CELERY_RESULT_BACKEND: redis://redis:6379/1
    ENGRAM_PROVIDER_MODE: ${ENGRAM_PROVIDER_MODE:-fake}
    ENGRAM_REALTIME_MIN_CONTENT_CHARS: ${ENGRAM_REALTIME_MIN_CONTENT_CHARS:-80}
    GRANIAN_WORKERS: ${ENGRAM_WEB_WORKERS:-2}
    GRANIAN_BLOCKING_THREADS: '4'
    GRANIAN_RESPAWN_FAILED_WORKERS: 'true'
    GRANIAN_WORKERS_KILL_TIMEOUT: '35'
    GRANIAN_WORKERS_MAX_RSS: ${ENGRAM_WEB_MAX_RSS_MB:-512}
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:
  api:
    <<: *backend
    command: >
      sh -ec "python manage.py migrate --noinput &&
              python manage.py engram_bootstrap_admin &&
              granian --interface wsgi settings.wsgi:application --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/-/readyz/"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  worker-realtime:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "celery -A engram.celery_app worker --loglevel=info -Q engram-realtime"

  worker-near-realtime:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "celery -A engram.celery_app worker --loglevel=info -Q engram-near-realtime"

  worker-batch:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "celery -A engram.celery_app worker --loglevel=info -Q engram-batch --prefetch-multiplier=1"

  worker-highmemory:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "celery -A engram.celery_app worker --loglevel=info -Q engram-highmemory"

  worker-domain-events:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "celery -A engram.celery_app worker --loglevel=info -Q engram-domain-events"

  beat:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "celery -A engram.celery_app beat --loglevel=info"

  relay:
    <<: *backend
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -ec "python manage.py celery_outbox_relay"

  frontend:
    image: engram-frontend:local
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_ENGRAM_API_URL: http://api:8000
      NUXT_TELEMETRY_DISABLED: '1'
      PORT: '3000'
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: engram
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      # PG18+ official image stores data in a major-version subdir; mount the parent.
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: engram
      RABBITMQ_DEFAULT_PASS: engram
      RABBITMQ_DEFAULT_VHOST: engram
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/conf.d/20-engram.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
