# RabbitMQ 4.x disabled transient non-exclusive queues by default; Celery declares
# them (mingle/gossip + task queues) and dies on queue.declare. Re-permit the feature.
deprecated_features.permit.transient_nonexcl_queues = true

# Headroom over distill time_limit (660s) so long-running batch distill deliveries
# aren't force-acked by the broker before the worker finishes (default 1800000).
consumer_timeout = 3600000
